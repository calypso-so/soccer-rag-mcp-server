name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    environment: npm-publish
    env:
      EXPECTED_NPM_SCOPE: "@calypsohq"
      EXPECTED_MCP_SERVER_NAME: "soccer-rag-mcp-server"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify npm package scope and name
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          EXPECTED_PACKAGE_NAME="${EXPECTED_NPM_SCOPE}/${EXPECTED_MCP_SERVER_NAME}"

          if [ "${PACKAGE_NAME}" != "${EXPECTED_PACKAGE_NAME}" ]; then
            echo "Unexpected package name: ${PACKAGE_NAME}"
            echo "Expected ${EXPECTED_PACKAGE_NAME}"
            exit 1
          fi

          PACKAGE_SCOPE="${PACKAGE_NAME%%/*}"
          PACKAGE_SERVER_NAME="${PACKAGE_NAME#*/}"

          if [ "${PACKAGE_SCOPE}" != "${EXPECTED_NPM_SCOPE}" ]; then
            echo "Unexpected npm scope: ${PACKAGE_SCOPE}"
            echo "Expected ${EXPECTED_NPM_SCOPE}"
            exit 1
          fi

          if [ "${PACKAGE_SERVER_NAME}" != "${EXPECTED_MCP_SERVER_NAME}" ]; then
            echo "Unexpected MCP server package name: ${PACKAGE_SERVER_NAME}"
            echo "Expected ${EXPECTED_MCP_SERVER_NAME}"
            exit 1
          fi

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Smoke stdio transport
        run: npm run smoke:stdio

      - name: Check npm version
        id: npm-version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
